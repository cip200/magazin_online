<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coșul meu de cumpărături</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
      .continut-cos {
        background: white;
        padding: 2rem;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      .articol-cos {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1rem;
        border-bottom: 1px solid #eee;
        flex-wrap: wrap;
        gap: 1rem;
      }
      .info-articol {
        display: flex;
        align-items: center;
        gap: 1rem;
      }
      .info-articol img {
        width: 70px;
        height: 70px;
        object-fit: cover;
        border-radius: 4px;
      }
      .total-general {
        margin-top: 2rem;
        text-align: right;
        font-size: 1.4rem;
        font-weight: bold;
        color: #2c3e50;
      }
      .cos-gol {
        text-align: center;
        padding: 3rem;
        color: #7f8c8d;
        font-size: 1.1rem;
      }
      /* Stil nou pentru buton */
      .buton-sterge {
        background: #e74c3c;
        color: white;
        border: none;
        padding: 0.7rem 1.2rem;
        border-radius: 4px;
        cursor: pointer;
        font-size: 0.95rem;
      }
      .buton-sterge:hover {
        background: #c0392b;
      }
    </style>
  </head>
  <body>
    <header>
      <h2>Magazinul Meu</h2>
      <div class="cos">🛒 <span id="contor-cos">0</span></div>
    </header>

    <main>
      <h1>Coșul de cumpărături</h1>
      <div class="continut-cos" id="lista-cos"></div>
      <div style="margin-top: 2rem">
        <a href="index.html" class="buton buton-detalii">Înapoi la magazin</a>
      </div>
    </main>

    <script type="module" src="js/cos.js"></script>
  </body>
</html>
